# ============================================================================
# DUT Configuration - Hardware Description Only
# ============================================================================
dut:
  name: alu
  entity_name: ALU_ENT   # VHDL entity name; omit for SV/Verilog (defaults to name)
  description: "Arithmetic Logic Unit with 16 operations"
  data_width: 8
  output_width: 16 # may not necessary for now
  clock_period: 10 # ns move to UVM_CONFIG
  reset_type: active_high # active_low / active_high
  language: systemverilog # verilog / systemverilog / vhdl  maybe not necessary now

# ============================================================================
# Parameters (for SystemVerilog generation)
# ============================================================================
parameters:
  - name: DATA_WIDTH
    value: 8
    description: "Width of data operands"

  - name: OUTPUT_WIDTH # MULT_RESULT_WIDTH
    value: 16
    description: "Width of output (for multiplication)"
  
  - name: MAX_VALUE
    value: 255 # 2^DATA_WIDTH - 1
    description: "Maximum value for data operands (for constraints)"

# ============================================================================
# Enumerations (shared across all files)
# ============================================================================
enums:
  # Operations enum
  operation_t:
    type: "logic [3:0]"
    values:
      - { value: 0, name: ADD, description: "Addition" }
      - { value: 1, name: SUB, description: "Subtraction" }
      - { value: 2, name: MULT, description: "Multiplication" }
      - { value: 3, name: AND, description: "Bitwise AND" }
      - { value: 4, name: OR, description: "Bitwise OR" }
      - { value: 5, name: XOR, description: "Bitwise XOR" }
      - { value: 6, name: SHIFT_LEFT, description: "Logical shift left" }
      - { value: 7, name: SHIFT_RIGHT, description: "Logical shift right" }
      - { value: 8, name: ROTATE_LEFT, description: "Rotate left" }
      - { value: 9, name: ROTATE_RIGHT, description: "Rotate right" }
      - { value: 10, name: NOT, description: "Bitwise NOT" }
      - { value: 11, name: NAND, description: "Bitwise NAND" }
      - { value: 12, name: NOR, description: "Bitwise NOR" }
      - { value: 13, name: XNOR, description: "Bitwise XNOR" }
      - { value: 14, name: INC, description: "Increment" }
      - { value: 15, name: DEC, description: "Decrement" }

  # MOVI enum
  movi_t:
    type: "logic [1:0]"
    values:
      - { value: 0, name: REGB_OPERAND, description: "Use REG_B as operand" }
      - { value: 1, name: MEM_OPERAND, description: "Use MEM as operand" }
      - { value: 2, name: IMM_OPERAND, description: "Use IMM as operand" }
      - { value: 3, name: UNKNOWN, description: "Invalid - should not be used" }

# ============================================================================
# Ports Definition
# ============================================================================
ports:
  # Clock and Reset
  - name: CLK
    direction: input
    type: logic
    width: 1 # single bit
    description: "Clock signal"
    is_clock: true

  - name: RST
    direction: input
    type: logic
    width: 1
    description: "Reset signal (synchronous)"
    is_reset: true
    active_level: high

  # Control Inputs
  - name: ACT
    direction: input
    type: logic
    width: 1
    description: "Activate signal for operation"

  # OP(3:0) [in]
  - name: OP
    direction: input
    type: logic
    width: (3:0) # also could be "4"
    description: "Operation selector (16 operations)"

    enum_name: operation_t # could be enum_type or enum

  # MOVI (1:0) [in]
  - name: MOVI
    direction: input
    type: logic
    width: (1:0)
    description: "operand B selector"

    enum_name: movi_t # could be enum_type or enum

  # DATA INPUTS
  # REG_ A (DATA WIDTH-1:0) [in]
  - name: REG_A
    direction: input
    type: logic
    width: DATA_WIDTH # reference parameter
    description: "Register A operand"


  # REG_ B (DATA WIDTH-1:0) [in]
  - name: REG_B
    direction: input
    type: logic
    width: DATA_WIDTH # reference parameter
    description: "Register B operand"


  - name: MEM
    direction: input
    type: logic
    width: DATA_WIDTH # reference parameter
    description: "Memory operand"


  - name: IMM
    direction: input
    type: logic
    width: DATA_WIDTH # reference parameter
    description: "Immediate operand"


  # Outputs
  - name: EX_ALU_VLD
    direction: output
    type: logic
    width: 1
    description: "Output valid signal"


  - name: EX_ALU
    direction: output
    type: logic
    width: DATA_WIDTH 
    description: "ALU result (16-bit for multiplication)"

  
  - name: ALU_RDY
    direction: output
    type: logic
    width: 1
    description: "ALU ready signal for handshaking"



