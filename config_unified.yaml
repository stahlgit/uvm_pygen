# ============================================================================
# Unified Configuration — DUT + UVM in a single file
# UVM_PYGEN detects this automatically (both 'dut:' and UVM keys present),
# or you can point to it explicitly with:  uvm_pygen --config config.yaml
# ============================================================================

# ============================================================================
# DUT — Hardware Description
# ============================================================================
dut:
  name: alu
  entity_name: ALU_ENT
  description: "Arithmetic Logic Unit with 16 operations"
  reset_type: active_high # active_low / active_high
  language: systemverilog

params:
  - name: DATA_WIDTH
    value: 8
    description: "Width of data operands"
  - name: OUTPUT_WIDTH
    value: 16
    description: "Width of output (for multiplication)"
  - name: MAX_VALUE
    value: 255
    description: "Maximum value for data operands (for constraints)"

enumerations:
  operation_t:
    type: "logic [3:0]"
    values:
      - { value: 0,  name: ADD,         description: "Addition" }
      - { value: 1,  name: SUB,         description: "Subtraction" }
      - { value: 2,  name: MULT,        description: "Multiplication" }
      - { value: 3,  name: AND,         description: "Bitwise AND" }
      - { value: 4,  name: OR,          description: "Bitwise OR" }
      - { value: 5,  name: XOR,         description: "Bitwise XOR" }
      - { value: 6,  name: SHIFT_LEFT,  description: "Logical shift left" }
      - { value: 7,  name: SHIFT_RIGHT, description: "Logical shift right" }
      - { value: 8,  name: ROTATE_LEFT, description: "Rotate left" }
      - { value: 9,  name: ROTATE_RIGHT,description: "Rotate right" }
      - { value: 10, name: NOT,         description: "Bitwise NOT" }
      - { value: 11, name: NAND,        description: "Bitwise NAND" }
      - { value: 12, name: NOR,         description: "Bitwise NOR" }
      - { value: 13, name: XNOR,        description: "Bitwise XNOR" }
      - { value: 14, name: INC,         description: "Increment" }
      - { value: 15, name: DEC,         description: "Decrement" }

  movi_t:
    type: "logic [1:0]"
    values:
      - { value: 0, name: REGB_OPERAND, description: "Use REG_B as operand" }
      - { value: 1, name: MEM_OPERAND,  description: "Use MEM as operand" }
      - { value: 2, name: IMM_OPERAND,  description: "Use IMM as operand" }
      - { value: 3, name: UNKNOWN,      description: "Invalid - should not be used" }

ports:
  - name: CLK
    direction: input  
    type: logic
    width: 1          
    is_clock: true
    description: "Clock signal"
    group: "Control Signals"
  
  - name: RST
    direction: input  
    type: logic 
    width: 1          
    is_reset: true
    active_level: high 
    description: "Reset signal (synchronous)"
    group: "Control Signals"

  - { name: ACT,        direction: input,  type: logic, width: 1,          description: "Activate signal" }
  - { name: OP,         direction: input,  type: logic, width: "(3:0)",    enum_name: operation_t, description: "Operation selector" }
  - { name: MOVI,       direction: input,  type: logic, width: "(1:0)",    enum_name: movi_t,      description: "Operand B selector" }
  - { name: REG_A,      direction: input,  type: logic, width: DATA_WIDTH, description: "Register A operand" }
  - { name: REG_B,      direction: input,  type: logic, width: DATA_WIDTH, description: "Register B operand" }
  - { name: MEM,        direction: input,  type: logic, width: DATA_WIDTH, description: "Memory operand" }
  - { name: IMM,        direction: input,  type: logic, width: DATA_WIDTH, description: "Immediate operand" }
  - { name: EX_ALU_VLD, direction: output, type: logic, width: 1,          description: "Output valid signal" }
  - { name: EX_ALU,     direction: output, type: logic, width: DATA_WIDTH, description: "ALU result" }
  - { name: ALU_RDY,    direction: output, type: logic, width: 1,          description: "ALU ready signal" }

# ============================================================================
# UVM — Verification Environment
# ============================================================================
verification:
  project_name: "ALU Functional Verification"
  testbench_name: "reference_testbench"

env:
  name: alu_env
  reference_model: 
    strategy: ap_subscriber
    implementation: sv_class

    # implementation: 
    #   type: sv_class

    # implementation:
    #   type: dpi_extern
    #   function: "alu_ref_model"   # C function name — required ak type == dpi_extern
    #   header: "alu_ref.h"         # C header — required ak type == dpi_extern

    connects:
      - from: write_agent.driver.ap        # analysis port on driver
        to: reference_model.analysis_export
    
      - from: write_agent.monitor.ap
        to: reference_model.analysis_export  # RM can have multiple exports
    
      - from: read_agent.monitor.ap
        to: scoreboard.actual_export
    
      - from: reference_model.ap_expected
        to: scoreboard.expected_export
  
  interfaces:
    - name: write_if
      ports: ["Control Signals", ACT, OP, MOVI, REG_A, REG_B, MEM, IMM]
    - name: read_if
      ports: ["EX_ALU_VLD", "EX_ALU", "ALU_RDY"]
    
  agents:
    - name: write_agent
      mode: active
      interface: write_if
      transaction: WriteTransaction
      components:
      - driver
      - sequencer
      - monitor
    - name: read_agent
      mode: passive
      interface: read_if
      transaction: ReadTransaction
      components:
      - monitor

transactions:
  - name: AluTransaction
    base_class: uvm_sequence_item
    field_overrides:
      - { name: rst,  randomize: false, default: 0 }
      - { name: act,  randomize: false, default: 1 }

  - name: WriteTransaction
    base_class: AluTransaction       # inherits from the global one
    field_overrides:
      - { name: op,   randomize: true }
      - { name: movi, randomize: true }

  - name: ReadTransaction
    base_class: uvm_sequence_item
    field_overrides: []              # output-only ports, no randomization needed
# sequences: []   # add sequences here when needed

simulation:
  compilation:
    options:
      - "+incdir+./agents"
      - "-timescale 1ps/1ps"
      - "-sv"
      - "+define+UVM_NO_DEPRECATED"
  elaboration:
    options:
      - "-uvmcontrol=all"
  simulation_options:
    default_test: random_test
    verbosity: UVM_MEDIUM
    coverage: true
  waveform:
    enabled: true
    format: wlf
    save_signals: ["/*"]

randomization:
  seed: 12345
