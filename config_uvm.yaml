# ============================================================================
# UVM Verification Environment Configuration
# ============================================================================

verification:
  project_name: "ALU Functional Verification"
  dut_config: "config_dut.yaml"  # Reference to DUT config
  testbench_name: "alu_tb"
  uvm_version: "1.2"
  
# ============================================================================
# UVM Environment Structure
# ============================================================================
environment:
  name: alu_env
  type: uvm_env
  #TODO: interface alu_if + possibility to add more (clocks, modports, etc.)
  
  components:
    # Agent for driving inputs
    - name: alu_agent
      # also add connect
      type: uvm_agent
      mode: active  # active/passive
      interface: alu_if
      
      subcomponents:
        driver:
          enabled: true
          type: uvm_driver
          
        sequencer:
          enabled: true
          type: uvm_sequencer
          
        monitor:
          enabled: true
          type: uvm_monitor
          
        coverage:
          enabled: true
          type: uvm_subscriber
    
    - name: output_agent # passive agent
      type: uvm_agent
      mode: passive
      interface: alu_if
      direction: output
      
      subcomponents:
        monitor:
          enabled: true
          type: uvm_monitor
          
        coverage:
          enabled: true
          type: uvm_subscriber

    #TODO add connect --> then we know how to connect analysis ports (scoreboard)
    # Scoreboard for checking
    - name: scoreboard
      type: uvm_scoreboard
      inputs:
        - from: alu_agent.monitor # could this be done as redefiniton ? inherited ?
          port: analysis_port
        - from: output_agent.monitor
          port: analysis_port
      comparison_method: golden_model
    
    
    
    # Golden/Reference Model
    # - name: golden_model
    #   type: uvm_subscriber
    #   input_from: alu_agent.driver
    #   behavior: "config_dut.yaml:behavior"  # Use DUT behavior spec
# ============================================================================
# Transaction Definition
# ============================================================================
transactions:
  # Input transaction
  name: AluTransaction
  base_class: uvm_sequence_item
  
  #auto_generater_from_dut: true # Automatically generate fields from DUT config file
  # just do all methods

  field_overrides:
    - name: rst
      randomize: false
      default: 0
    
    - name: act
      randomize: false 
      default: 1
    
    - name: op
      randomize: true
    
    - name: movi
      randomize: true
  # do all without user permission 
  #methods:
  #  - do_copy
  #  - do_compare
  #  - do_print
  #  - do_record

# ============================================================================
# Sequences Definition
# ============================================================================
sequences:
  # Base sequence
  - name: base_sequence
    type: uvm_sequence # should i really use uvm_sequence ? will there be different types ?
    transaction: AluTransaction # Reference to transaction defined above
    abstract: true
    
  # Random sequence
  - name: random_sequence
    type: uvm_sequence
    extends: base_sequence
    #transaction_count: 50
    randomization: full
    description: "Fully randomized transactions"
    
  # Directed sequences
  - name: corner_case_sequence
    type: uvm_sequence
    extends: base_sequence
    # transaction_count: "configurable" # set via test
    description: "Focus on corner cases"
    constraints:
    # use corner_case from config_dut.yaml
      - use_corner_cases: true
      #- "reg_a inside {0, MAX_VALUE, [1:15], [(MAX_VALUE-15):(MAX_VALUE-1)]}"
      #- "reg_b inside {0, MAX_VALUE}"
      
  - name: all_operations_sequence
    type: uvm_sequence
    extends: base_sequence
    description: "Execute each operation at least once"
    directed: true
    # some field to tell this should use operations from config_dut.yaml ?
    operation_list: "config_dut.yaml:operations" 

  - name: mult_sequence
    type: uvm_sequence
    extends: base_sequence
    transaction_count: 100
    description: "Focus on multiplication"
    constraints:
      - "op == MULT"
      
  - name: zero_output_sequence
    type: uvm_sequence
    extends: base_sequence
    description: "Try to generate zero output"
    constraints:
      - "op == SUB"
      - "reg_a == reg_b"

# ============================================================================
# Coverage Configuration
# ============================================================================
coverage:
  # For now EMPTY
  enable: true
  per_instance: true  # Enable per-instance coverage
  
  # Auto-generate coverpoints for:
  # - All enum ports (OP, MOVI)
  # - All data ports with corner_cases bins
  # - Transition coverage for operations
  auto_generate:
    enum_coverpoints: true
    data_coverpoints: true
    transitions: true

  # Manual coverpoint specifications (if needed)
  custom_coverpoints:
    - name: alu_output_corners
      sample_field: "ex_alu"
      bins:
        - name: zeros
          values: [0]
        - name: max_8bit
          values: [0xFF]
        - name: max_16bit
          values: [0xFFFF]
  
  # Cross coverage (auto-generated from DUT config)
  cross_coverage:
    - coverpoints: [opA_coverage, movi_coverage]
    - coverpoints: [opB_coverage, movi_coverage]
    - coverpoints: [opIMM_coverage, movi_coverage]
    - coverpoints: [opMEM_coverage, movi_coverage]

  # Coverage goals
  # OPTIONAL 
  goals:
    functional: 100
    code: 95
    toggle: 90


