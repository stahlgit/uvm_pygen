# ============================================================================
# Simulation Configuration
# ============================================================================
simulation:
  # simulator: questa just questa only it could be extended later
  # hardcoded for now
  
  compilation:
    options:
      - "+incdir+./agents"
      - "-timescale 1ps/1ps"
      - "-sv"
      - "+define+UVM_NO_DEPRECATED"
    
  elaboration:
    options:
      - "-uvmcontrol=all"
      
  simulation_options:
    default_test: random_test
    verbosity: UVM_MEDIUM
    coverage: true
    coverage_options:
      - "-cvgperinstance"
    
  waveform:
    enabled: true
    format: wlf
    save_signals:
      - "/*"  # All signals
      
  reporting:
    formats:
      - html
      - text
    outputs:
      coverage: "coverage_report.html"
      log: "simulation.log"

# ============================================================================
# Random Control
# ============================================================================
randomization:
  seed: 12345  # Fixed seed for reproducibility (or 'random' for varying)
