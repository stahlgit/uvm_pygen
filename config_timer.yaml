# ============================================================================
# Unified Configuration — Timer DUT + UVM
# ============================================================================

# ============================================================================
# DUT — Hardware Description
# ============================================================================
dut:
  name: timer
  entity_name: timer
  description: "Register-mapped countdown/up timer with IRQ, 4 modes, and 64-bit cycle counter"
  data_width: 32
  output_width: 32
  clock_period: 10        # ns
  reset_type: active_low  # RST = '0' triggers reset (process checks RST = '0')
  language: vhdl

parameters:
  - name: ADDR_WIDTH
    value: 32
    description: "Width of the address bus"
  - name: DATA_WIDTH
    value: 32
    description: "Width of the data bus"
  - name: TIMER_ADDR_SPACE_BITS
    value: 8
    description: "Address space bit width for timer registers (256-byte window)"
  - name: RST_ACT_LEVEL
    value: 1
    description: "Reset active level: 1 = active low RST pin (default), matches process logic"

enums:
  request_t:
    type: "logic [1:0]"
    values:
      - { value: 0, name: REQ_NONE,     description: "No request" }
      - { value: 1, name: REQ_READ,     description: "Read register" }
      - { value: 2, name: REQ_WRITE,    description: "Write register" }
      - { value: 3, name: REQ_RESERVED, description: "Reserved — triggers ERROR response" }

  response_t:
    type: "logic [2:0]"
    values:
      - { value: 0, name: RSP_IDLE,      description: "No active transaction" }
      - { value: 1, name: RSP_ACK,       description: "Transaction accepted" }
      - { value: 2, name: RSP_WAIT,      description: "Wait (not generated by DUT currently)" }
      - { value: 3, name: RSP_ERROR,     description: "Reserved request code used" }
      - { value: 4, name: RSP_UNALIGNED, description: "Address not 32-bit aligned" }
      - { value: 5, name: RSP_OOR,       description: "Address outside timer address space" }

  timer_mode_t:
    type: "logic [1:0]"
    values:
      - { value: 0, name: DISABLED,     description: "Counter stopped" }
      - { value: 1, name: AUTO_RESTART, description: "Count to CMP then restart from 0" }
      - { value: 2, name: ONE_SHOT,     description: "Count to CMP then disable itself" }
      - { value: 3, name: CONTINUOUS,   description: "Free-running counter, no compare" }

# Register map (informational — used by predictor)
register_map:
  - { name: TIMER_CNT,     offset: "0x00", access: read_write,  description: "Timer Count register (32-bit)" }
  - { name: TIMER_CMP,     offset: "0x04", access: read_write,  description: "Timer Compare register (32-bit)" }
  - { name: TIMER_CR,      offset: "0x08", access: read_write,  description: "Timer Control register — bits[1:0] = mode" }
  - { name: TIMER_CYCLE_L, offset: "0x10", access: read_only,   description: "64-bit cycle counter, low word" }
  - { name: TIMER_CYCLE_H, offset: "0x14", access: read_only,   description: "64-bit cycle counter, high word" }

ports:
  - { name: CLK,      direction: input,  type: std_logic,        width: 1,  is_clock: true,  description: "Clock signal" }
  - { name: RST,      direction: input,  type: std_logic,        width: 1,  is_reset: true,  active_level: low, description: "Asynchronous reset (active low)" }
  - { name: REQUEST,  direction: input,  type: std_logic_vector, width: 2,  enum_name: request_t,  description: "Bus request type" }
  - { name: ADDRESS,  direction: input,  type: std_logic_vector, width: "ADDR_WIDTH", description: "Register address" }
  - { name: DATA_IN,  direction: input,  type: std_logic_vector, width: "DATA_WIDTH", description: "Write data" }
  - { name: RESPONSE, direction: output, type: std_logic_vector, width: 3,  enum_name: response_t, description: "Bus response (combinational from current + registered request)" }
  - { name: DATA_OUT, direction: output, type: std_logic_vector, width: "DATA_WIDTH", description: "Read data (valid when RESPONSE = RSP_ACK and request was READ)" }
  - { name: P_IRQ,    direction: output, type: std_logic,        width: 1,  description: "Interrupt: high when timer enabled and cnt == cmp" }

# ============================================================================
# UVM — Verification Environment
# ============================================================================
verification:
  project_name: "Timer Functional Verification"
  testbench_name: "timer_testbench"

environment:
  name: timer_env
  type: uvm_env
  reference_model:
    strategy: ap_subscriber
  components:
    - name: timer_agent
      type: uvm_agent
      mode: active
      interface: timer_if
      subcomponents:
        driver:    { enabled: true, type: uvm_driver }
        sequencer: { enabled: true, type: uvm_sequencer }
        monitor:   { enabled: true, type: uvm_monitor }
        coverage:  { enabled: true, type: uvm_subscriber }

transactions:
  name: TimerTransaction
  base_class: uvm_sequence_item
  field_overrides:
    - { name: rst,      randomize: false, default: 1 }   # active-low: 1 = not in reset
    - { name: request,  randomize: true }
    - { name: address,  randomize: true }
    - { name: data_in,  randomize: true }

simulation:
  compilation:
    options:
      - "+incdir+./agents"
      - "-timescale 1ps/1ps"
      - "-sv"
      - "+define+UVM_NO_DEPRECATED"
  elaboration:
    options:
      - "-uvmcontrol=all"
  simulation_options:
    default_test: random_test
    verbosity: UVM_MEDIUM
    coverage: true
  waveform:
    enabled: true
    format: wlf
    save_signals: ["/*"]

randomization:
  seed: 12345

# ============================================================================
# Predictor notes (for reference model implementation)
# ============================================================================
# Pipeline: all register accesses are 1-cycle pipelined.
#   Cycle N:   REQUEST/ADDRESS/DATA_IN presented → response computed combinatorially
#   Cycle N+1: re_q/we_q/bus_addr_q/bus_data_wr_q registered → register read/write occurs
#              RESPONSE output reflects the pipelined result
#
# Response priority (combinatorial, cycle N):
#   REQ_NONE/RESERVED → IDLE (RESERVED also → ERROR)
#   Unaligned address (ADDRESS[1:0] != 00) → UNALIGNED
#   Upper address bits non-zero → OOR
#   Otherwise → ACK
#
# Register writes (cycle N+1, only if we_q='1'):
#   0x00 → cnt_reg   (can pre-load counter)
#   0x04 → cmp_reg
#   0x08 → ctrl_reg[1:0]  (sets timer mode)
#
# Register reads (cycle N+1, only if re_q='1'):
#   0x00 → cnt_reg, 0x04 → cmp_reg, 0x08 → ctrl_reg
#   0x10 → cycle_cnt[31:0], 0x14 → cycle_cnt[63:32]
#   Unknown address within space → ACK with 0x00000000
#
# Counter tick logic (combinatorial, every cycle):
#   AUTO_RESTART: cnt++ ; if cnt==cmp → cnt=0
#   ONE_SHOT:     cnt++ ; if cnt==cmp → cnt=0, ctrl=DISABLED
#   CONTINUOUS:   cnt++ (no compare)
#   DISABLED:     no change
#
# IRQ: P_IRQ = '1' when ctrl_reg != DISABLED and cnt_reg == cmp_reg
#
# cycle_cnt: free-running 64-bit counter, increments every clock, resets with RST